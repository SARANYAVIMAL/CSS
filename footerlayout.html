<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Footer</title>
  <style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

main {
    padding: 20px;
}

ul {
    list-style: none;
}

a {
    text-decoration: none;
    color: #fff;
}


footer {
    background-color: #333;
    color: #fff;
    padding: 20px 0;
   
    display: flex;
    justify-content: space-around; 
    align-items: center;           
    flex-wrap: wrap;               
    margin-top: auto;              
    width: 100%;
}

.footer-col {
    padding: 10px 20px;
    text-align: center;
    
    flex-grow: 1;
    
    min-width: 200px;
}

.footer-col h3 {
    margin-bottom: 15px;
    border-bottom: 2px solid #fff;
    padding-bottom: 5px;
    display: inline-block;
}

.footer-col p, .footer-col ul li {
    margin-bottom: 5px;
}

.social-icons img {
    margin: 0 5px;
    border-radius: 50%;
}


@media (max-width: 600px) {
    footer {
        flex-direction: column;
        align-items: flex-start;
    }

    .footer-col {
        text-align: left;
        width: 100%;
    }

    .social-icons {
        margin-top: 10px;
    }
}
  </style>
</head>
<body>
 <footer>
       
        <div class="footer-col">
            <h3>Site Links</h3>
            <nav>
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">About Us</a></li>
                    <li><a href="#">Services</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </nav>
        </div>

        
        <div class="footer-col">
            <h3>Contact Us</h3>
            <p>Email: info@example.com</p>
            <p>Phone: 48588590</p>
            <p>Address: ABC street</p>
        </div>

       
        <div class="footer-col">
            <h3>Follow Us</h3>
            <div class="social-icons">
                
                <img src="D:\PYTHON FULL STACK\HTML FOLDER\CSS\day8\fb image.png" alt="Facebook" width="100" height="100">
                
            </div>
        </div>
    </footer>

</body>
</html>
