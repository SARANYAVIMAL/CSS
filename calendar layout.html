<!DOCTYPE html>
<html>
  <head>
    <title>Hello, World!</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <style>
  .calendar
        {
        display:grid;
        grid-template-columns: 100% 3fr;
        grid-template-rows: 1fr 1fr 1fr;
        }
        .child
        {
          background-color: rgb(212, 46, 102);
          padding: 20px;
          border: 1px solid #090909;
          color:beige;
          font: bold;
        }
        h1{
         text-align: center;
  /* or grid-column: 1 / 3; to explicitly start at line 1 and end at line 3 */
         }
    
  </style>
  <body>
    <div class="container"></div>
      <h1>DATE</h1>
      <div class="child">MORNING</div>
      <div class="child">AFTERNOON</div>
      <div class="child">EVENING</div>

  </body>
</html>
